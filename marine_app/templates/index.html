<!DOCTYPE html>
<html>
<head>
    <title>Marine Species Detection</title>
</head>
<body>

<h2>Marine Species Detection System</h2>

<form method="POST" enctype="multipart/form-data">

    <input type="file" name="image" required>

    <br><br>

    <button type="submit">
        Detect Species
    </button>

</form>

{% if prediction %}

<h3>
Prediction: {{ prediction }}
</h3>

<h3>
Confidence: {{ confidence }} %
</h3>

{% endif %}

</body>
</html>
